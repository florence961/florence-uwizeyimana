<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Education App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
  <header class="app-header">
    <div class="header-logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">EDUCATION</span>
    </div>
    <div class="header-nav">
      <button class="nav-arrow" onclick="history.back()">←</button>
      <button class="nav-arrow" onclick="history.forward()">→</button>
    </div>
  </header>

  <div class="page active">
    <div class="page-content contact-page">
      <div class="page-label-btn">contact</div>

      <div class="contact-list">
        <div class="contact-item">
          <span class="contact-icon">📍</span>
          <span>Rwanda-ngoma-kibungo</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">✉️</span>
          <a href="mailto:educationa12@gmail.com" style="color:inherit;">educationa12@gmail.com</a>
        </div>
        <div class="contact-item">
          <span class="contact-icon">💬</span>
          <span>+250793412954</span>
        </div>
        <div class="contact-item">
          <span class="contact-icon">📘</span>
          <span>education app</span>
        </div>
      </div>

      <!-- Optional message form -->
      <div style="margin-top:28px;">
        <div class="section-heading" style="font-size:0.95rem;margin-bottom:12px;">Send us a message</div>
        <form id="contact-form" novalidate style="display:flex;flex-direction:column;gap:12px;">
          <input class="auth-input" style="border-radius:10px;background:white;" type="text" id="cf-name" placeholder="Your name"/>
          <input class="auth-input" style="border-radius:10px;background:white;" type="email" id="cf-email" placeholder="Your email"/>
          <textarea class="auth-input" style="border-radius:10px;background:white;resize:vertical;min-height:90px;" id="cf-msg" placeholder="Your message"></textarea>
          <div class="error-msg" id="cf-error"></div>
          <div class="success-msg" id="cf-success"></div>
          <button type="submit" class="auth-btn btn-blue" style="align-self:flex-start;padding:12px 32px;font-size:0.95rem;">Send</button>
        </form>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-social">
      <a href="https://facebook.com/educationapp12" target="_blank" class="social-item" title="Facebook">
        <i class="fab fa-facebook-f social-icon"></i>
        <span class="social-label">educationapp12</span>
      </a>
      <a href="https://twitter.com/educationapp12" target="_blank" class="social-item" title="Twitter">
        <i class="fab fa-twitter social-icon"></i>
        <span class="social-label">educationapp12</span>
      </a>
      <a href="https://instagram.com/educationapp12" target="_blank" class="social-item" title="Instagram">
        <i class="fab fa-instagram social-icon"></i>
        <span class="social-label">educationapp12</span>
      </a>
      <a href="https://linkedin.com/company/educationapp" target="_blank" class="social-item" title="LinkedIn">
        <i class="fab fa-linkedin-in social-icon"></i>
        <span class="social-label">educationapp</span>
      </a>
    </div>
  </footer>

  <script>
    function sanitize(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = sanitize(document.getElementById('cf-name').value.trim());
      const email = sanitize(document.getElementById('cf-email').value.trim());
      const msg = sanitize(document.getElementById('cf-msg').value.trim());
      const err = document.getElementById('cf-error');
      const ok = document.getElementById('cf-success');
      err.textContent = '';
      ok.textContent = '';
      if (!name || !email || !msg) { err.textContent = 'Please fill in all fields.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = 'Enter a valid email.'; return; }
      const messages = JSON.parse(localStorage.getItem('edu_messages') || '[]');
      messages.push({ name, email, msg, date: new Date().toISOString() });
      localStorage.setItem('edu_messages', JSON.stringify(messages));
      ok.textContent = 'Message sent! We will get back to you soon.';
      this.reset();
    });
  </script>
</body>
</html>
